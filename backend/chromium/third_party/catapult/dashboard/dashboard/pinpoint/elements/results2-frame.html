<link rel="import" href="/components/iron-ajax/iron-ajax.html">
<link rel="import" href="/components/paper-spinner/paper-spinner.html">

<dom-module id="results2-frame">
  <template>
    <style>
      iframe {
        border: 0;
        height: 50em;
        width: 100%;
      }
    </style>

    <iron-ajax auto id="ajax" url="/api/results2/[[jobId]]" last-response="{{status}}"></iron-ajax>
    <template is="dom-if" if="[[getJobIncomplete(status)]]">
      <p>Waiting for job to complete...</p>
    </template>

    <template is="dom-if" if="[[getStarted(status)]]">
      <p>Generating Results2....</p>
      <paper-spinner></paper-spinner>
    </template>

    <template is="dom-if" if="[[getFailed(status)]]">
      <p>Generating the Results2 file failed.</p>
    </template>

    <template is="dom-if" if="[[getComplete(status)]]">
      <template is="dom-if" if="[[getTooOldForM80(status)]]">
        <p><b>WARNING:</b>
        Results generated before Nov 14, 2019 do not render in Chrome M80 or
        newer.  See
        <a href="https://bugs.chromium.org/p/chromium/issues/detail?id=1021137"
          >crbug.com/1021137</a>.</p>
      </template>
      <iframe src="[[iframeSrc]]"></iframe>
    </template>
  </template>

  <script>
    'use strict';
    Polymer({
      is: 'results2-frame',

      properties: {
        jobId: {
          type: Object,
        },

        status: {
          type: Object,
          observer: '_statusChanged',
        },

        client: {
          type: Object,
        },

        user: {
          type: String,
        },

        limitedAccess: {
          type: Boolean,
          value: false,
        },

        iframeSrc: {
          type: String,
          value: 'about:blank',
        },

        _authRequested: {
          type: Boolean,
          value: false,
        },
      },

      observers: [
        '_updateIframeSrc(status, client.authHeaders, limitedAccess)'
      ],

      _updateIframeSrc(status, authHeaders, limitedAccess) {
        console.log('results2-frame: Updating iframe src. Status:', status, 'Headers:', authHeaders, 'Limited Access:', limitedAccess);
        this.iframeSrc = this.getStatusURL(status, authHeaders, limitedAccess);

        // If auth headers are missing, try to authenticate once.
        if (limitedAccess && (!authHeaders || !authHeaders.Authorization)) {
             console.log('results2-frame: Auth headers missing.');

             if (this.client && this.client.requestAccessToken && !this._authRequested) {
                 console.log('results2-frame: Requesting access token.');
                 this._authRequested = true;

                 // index-page.html calls this.client.open_dialog() when auth completes.
                 // We define it here to reset our state.
                 this.client.open_dialog = () => {
                     console.log('results2-frame: Auth flow completed.');
                     this._authRequested = false;
                 };

                 this.client.requestAccessToken({hint: this.user});
             }
        }
      },

      getStatusURL(status, authHeaders, limitedAccess) {
        if (!status || !status.url) {
          return 'about:blank';
        }
        let url = status.url;
        if (limitedAccess && authHeaders && authHeaders.Authorization) {
          const token = authHeaders.Authorization.replace('Bearer ', '');
          console.log('results2-frame: Appending token to URL.');
          if (url.indexOf('?') === -1) {
            url += '?access_token=' + token;
          } else {
            url += '&access_token=' + token;
          }
        } else {
            console.log('results2-frame: Skipping token append.');
        }
        return url;
      },

      getStarted(status) {
        return this.status.status == 'pending';
      },

      getFailed(status) {
        return this.status.status == 'failed';
      },

      getJobIncomplete(status) {
        return this.status.status == 'job-incomplete';
      },

      getComplete(status) {
        return this.status.status == 'complete';
      },

      getTooOldForM80(status) {
        // Results2 pages generated before this date depend on features removed
        // in M80.
        return new Date(this.status.updated + 'Z') <
            new Date('2019-11-14T00:00:00Z');
      },

      _statusChanged() {
        const visible = !!(this.offsetWidth ||
                          this.offsetHeight ||
                          this.getClientRects().length);
        if (!this.getComplete(this.status) && visible) {
          this.async(() => this.$.ajax.generateRequest(), 5000);
        }
      },
    });
  </script>
</dom-module>
