<!DOCTYPE html>
<html>
    <head><title>Powerline video playback test (Multistream - Small)</title></head>
    <body>
        <p>Tests playback of three videos, one encoded with AV1@360p and one with VP9@240p and a prestige video at 720p with H264.</p>
        <div>
            <video muted playsinline controls autoplay loop>
                <source src="./con-corgi-720p.mp4" />
            </video>
        </div>
        <div>
            <video muted playsinline controls autoplay loop>
                <source src="./adv-motor-240p.webm" />
            </video>
        </div>
        <div>
            <video muted playsinline controls autoplay loop>
                <source src="./adv-fashion-360p.mp4" />
            </video>
        </div>
    </body>
</html>
