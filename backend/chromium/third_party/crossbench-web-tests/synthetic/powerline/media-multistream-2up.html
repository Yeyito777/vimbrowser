<!DOCTYPE html>
<html>
    <head><title>Powerline video playback test (Multistream - Small)</title></head>
    <body>
        <p>Tests playback of two small videos, one encoded with AV1@360p and one with VP9@240p.</p>
        <div>
            <video muted playsinline controls autoplay loop>
                <source src="./adv-motor-240p.webm" type="video/webm" />
            </video>
        </div>
        <div>
            <video muted playsinline controls autoplay loop>
                <source src="./adv-fashion-360p.mp4" type="video/webm" />
            </video>
        </div>
    </body>
</html>
