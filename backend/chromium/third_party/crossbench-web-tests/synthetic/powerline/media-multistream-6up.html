<!DOCTYPE html>
<html>
    <head><title>Powerline video playback test (Multistream - Small)</title></head>
    <body>
        <p>This is a more extreme test which plays back 4 streams of VP9 content and 2 streams of AV1.</p>
        <div>
            <video muted playsinline controls autoplay loop>
                <source src="./adv-motor-240p.webm" />
            </video>
        </div>
        <div>
            <video muted playsinline controls autoplay loop>
                <source src="./adv-motor-360p.webm" />
            </video>
        </div>
        <div>
            <video muted playsinline controls autoplay loop>
                <source src="./adv-motor-480p.webm" />
            </video>
        </div>
        <div>
            <video muted playsinline controls autoplay loop>
                <source src="./adv-motor-720p.webm" />
            </video>
        </div>
        <div>
            <video muted playsinline controls autoplay loop>
                <source src="./adv-fashion-240p.mp4" />
            </video>
        </div>
        <div>
            <video muted playsinline controls autoplay loop>
                <source src="./adv-fashion-480p.mp4" />
            </video>
        </div>
    </body>
</html>
