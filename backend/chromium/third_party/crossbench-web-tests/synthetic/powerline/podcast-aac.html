<!DOCTYPE html>
<html>
    <head><title>Powerline background audio test (AAC)</title></head>
    <body>
        <p>The audio is playing (but muted).</p>
        <video id="audio" muted playsinline controls autoplay loop>
            <source src="./podcast.m4a" type="audio/aac" />
        </video>
        <button id="unmuteButton">Click to unmmute</button>

        <script>
        document.getElementById("unmuteButton").addEventListener('click', function() {
            document.getElementById("audio").muted = false;
        });
        </script>
    </body>
</html>
